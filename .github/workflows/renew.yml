# .github/workflows/renew.yml
name: KataBump Renew Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    
    env:
      WECOM_BOT_KEY: ${{ secrets.WECOM_BOT_KEY }}
      USERS_JSON: ${{ secrets.USERS_JSON }}
      CHROME_PATH: /usr/bin/google-chrome
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      PROXY_URL: ${{ secrets.PROXY_URL }}
      HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
      NO_PROXY: localhost,127.0.0.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 不依赖 lock 文件，用 package.json 做缓存 key
          cache-dependency-path: '**/package.json'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm-dev libxkbcommon-dev libgbm-dev libasound2
          sudo apt-get install -y curl xvfb
          google-chrome --version

      - name: Install npm dependencies
        run: |
          # 如果没有 package-lock.json，npm install 会生成一个
          npm install
          npx playwright install chromium

      - name: Setup sing-box proxy (optional)
        if: ${{ env.PROXY_URL != '' }}
        run: |
          SINGBOX_VERSION="1.10.0"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz"
          sudo mv sing-box-${SINGBOX_VERSION}-linux-amd64/sing-box /usr/local/bin/sing-box
          mkdir -p ~/.config/sing-box
          echo "${{ secrets.SINGBOX_CONFIG_BASE64 }}" | base64 -d > ~/.config/sing-box/config.json
          nohup sing-box run -c ~/.config/sing-box/config.json > sing-box.log 2>&1 &
          sleep 3
          curl -s http://127.0.0.1:8080 || echo "sing-box may not be ready"

      - name: Run renew script
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node renew.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}-${{ github.run_attempt }}
          path: screenshots/
          retention-days: 7

      - name: Cleanup sing-box
        if: always() && env.PROXY_URL != ''
        run: |
          pkill sing-box || true
